    gradle:
      - yes
    output: ../build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    binary: 
      https://github.com/RealNoitasinagro/epoch/releases/download/v%v/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - linux
      - web
    prebuild:
      - flutterVersion=$(cat ../.flutter-version)
