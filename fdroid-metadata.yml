AutoName: Epoch
Description: |-
  Epoch displays the current moment across a wide range of time
  systems — updating every second, all in one place.

  Time systems included:
  * Civil: date, time, day second, day percent — for any timezone
  * Technical: Unix time, TAI, GPS time
  * Astronomical: GMST, Julian Date, Modified Julian Date
  * Curiosities: Swatch Internet Time, binary clocks, Doomsday Clock

  Fully configurable Watchlist tab — combine any values in any order.
  Night mode with red-on-black display for stargazing.
  No ads, no tracking, no network requests, no permissions required.
  Available in English and German.

